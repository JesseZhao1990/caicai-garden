name: Publish Android release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/release-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Restore release signing key
        shell: bash
        run: printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$ANDROID_KEYSTORE_FILE"

      - name: Resolve and validate version
        id: version
        shell: bash
        run: |
          VERSION_NAME=$(sed -n 's/.*versionName = "\([^"]*\)".*/\1/p' app/build.gradle.kts | head -1)
          if [[ -z "$VERSION_NAME" ]]; then
            echo "Unable to read versionName" >&2
            exit 1
          fi
          TAG_NAME="v$VERSION_NAME"
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" != "$TAG_NAME" ]]; then
            echo "Tag ${{ github.ref_name }} does not match app version $TAG_NAME" >&2
            exit 1
          fi
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Build signed APK
        run: ./gradlew :app:assembleRelease --no-daemon --console=plain

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          APK=app/build/outputs/apk/release/app-release.apk
          ASSET_NAME="caicai-garden-${TAG_NAME}.apk"
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "$APK#$ASSET_NAME" --repo "$GITHUB_REPOSITORY" --clobber
          else
            NOTES_FILE="docs/releases/${TAG_NAME}.md"
            if [[ -f "$NOTES_FILE" ]]; then
              gh release create "$TAG_NAME" "$APK#$ASSET_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --target main \
                --title "菜园管家 ${TAG_NAME}" \
                --notes-file "$NOTES_FILE"
            else
              gh release create "$TAG_NAME" "$APK#$ASSET_NAME" \
                --repo "$GITHUB_REPOSITORY" \
                --target main \
                --title "菜园管家 ${TAG_NAME}" \
                --notes "菜园管家 Android ${TAG_NAME} 正式版。"
            fi
          fi
